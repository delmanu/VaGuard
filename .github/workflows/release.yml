name: Release

# Triggered by version tags: v1.0.0, v0.2.3-beta, etc.
# To release: git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-windows:
    name: Build & release (Windows)
    runs-on: windows-latest
    permissions:
      contents: write   # needed to create the GitHub Release

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node.js ──────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── 3. Rust stable ──────────────────────────────────────────────────────
      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # Cache Cargo registry + compiled deps to speed up subsequent runs
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            src-tauri\target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ── 4. Install npm dependencies ─────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── 5. Build Tauri app ──────────────────────────────────────────────────
      - name: Build Tauri app
        run: npm run tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 6. Collect installer artifacts ─────────────────────────────────────
      # Tauri v2 emits installers to src-tauri/target/release/bundle/
      - name: Find installer files
        id: find_artifacts
        shell: pwsh
        run: |
          $msi  = Get-ChildItem "src-tauri/target/release/bundle/msi/*.msi"  -ErrorAction SilentlyContinue | Select-Object -First 1
          $exe  = Get-ChildItem "src-tauri/target/release/bundle/nsis/*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          $files = @()
          if ($msi)  { $files += $msi.FullName  }
          if ($exe)  { $files += $exe.FullName  }
          $joined = $files -join "`n"
          "files<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          $joined      | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "EOF"        | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Artifacts found: $($files.Count)"
          foreach ($f in $files) { Write-Host "  $f" }

      # ── 7. Publish GitHub Release ───────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "VaGuard ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: ${{ steps.find_artifacts.outputs.files }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
